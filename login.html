<html lang="en">

<head>
    <meta charset="GBK">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,Chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="/academic/styles/newstyle/login/css/style.css" >
    <link rel="stylesheet" type="text/css" href="/academic/styles/newstyle/login/css/style_1007.css" >
    <script type="text/javascript" src="/academic/styles/newstyle/previous/js/md5.js?radom=1778677007460"></script>
    <script src="/academic/styles/newstyle/previous/js/jquery.min.js"></script>
    <script src="/academic/styles/newstyle/previous/js/aes.js"></script>
    <script language="javascript" src="/academic/styles/newstyle/previous/js/mode-ecb-min.js"></script>
    <script src="/academic/styles/newstyle/previous/js/layer/layer.js"></script>
    <script type="text/javascript">
        //页面初始化
        window.onload = function () {
            var nameLocal = localStorage.getItem("j_username");
            //如果有用户名就自动填了
            if (nameLocal != '' && nameLocal != null) {
                document.getElementById('name').setAttribute("value", nameLocal);
                document.getElementById('isremember').checked = true;
            } else {
                document.getElementById('name').setAttribute("value", '');
            }
            
        }

        function submitForm() {
            this.iserror("error");
            let flag = true;
            
            
            
//            let jcaptchaValue = formData.get("j_captcha");
            let usernameValue = $("input[name='j_username']").val();
            let pswValue = $("input[name='j_password']").val();
            let jcaptchaValue = $("input[name='j_captcha']").val();
            let isremember = document.getElementById('isremember').checked;
            let storage = window.localStorage;

            //用户名
            if (usernameValue == "") {
                this.infobox('userwrap', '用户名不能为空！', 0);
                flag = false;
            }
            if (pswValue == '') {
                this.infobox('pwdwrap', '密码不能为空！', 1);
                flag = false;
            }

            
            if(flag){
                loginAction();
            }
            
            return false;
        }

        function loginAction(){
            
            
            
            
            let usernameValue = $("input[name='j_username']").val();
            let pswValue = $("input[name='j_password']").val();
            let jcaptchaValue = $("input[name='j_captcha']").val();
            let isremember = document.getElementById('isremember').checked;
            let storage = window.localStorage;
            // 验证码正确写这里
            if (isremember) {
                //如果记住密码了.并且用户名不为空 就储存
                storage.setItem("j_username", usernameValue)
            } else {
                storage.setItem("j_username", '')
            }
            let newpd = trans();
            let loginLink= "/academic/j_acegi_security_check?j_username="+usernameValue+"&j_password="+newpd+"&j_captcha="+jcaptchaValue;
            location.href= loginLink;
            return true;
        }

        function  trans() {
            layer.load(0,{shade:[0.3,"#000"]});
            let passvalue = document.use.j_password.value;
            return  plaintext(passvalue,'null');
        }


        //错误提示框：id：use(账号登录)&phone(手机登录), item('错误语句提示'),i('第几个login-form-item，从0开始计数,几个input就是第几个')
        //例：this.infobox('use', '用户名错误', 0)
        function infobox(id, item, i) {
            if (item == undefined) {
                item = '输入错误,请重新验证';
            }
            let div = window.document.createElement("div");
            div.name = "error";
            div.className = "login-form-item error";
            let imgs = window.document.createElement('img');
            imgs.src = "/academic/styles/newstyle/login/imgs/login_ico_error.png";
            let span = window.document.createElement('span');
            span.innerHTML = item;
            div.appendChild(imgs);
            div.appendChild(span);
            //this.iserror('error');
            $("#" + id).after(div);
        }

        //判断之前有没有error提示 有的话就去掉
        function iserror() {
            $("div.error").remove();
        }

    </script>
</head>
<body>
<div class="head">
    <img src="/academic/styles/newstyle/login/imgs/login_logo1007.png" onerror="javascript:this.src='/academic/styles/newstyle/login/imgs/login_logo0.png'" alt="Logo">
</div>
<div class="main">
    <div class="log_box ">
        <p>欢迎登录</p>
        <div class="tabs">
            <div class="tabs_title">
                <div class="tab_title tab-title_active" id="tab1" onclick="tabs(this)">
                    <a>账号登录</a>
                </div>
                
            </div>

            <div class="tabs_context">
                <div class="tab-content isshow" id="usename">
                    <form name="use" id="use" autocomplete="new-password">
                        <input type="hidden" name="randomTag" value="f5434971bdec4719011bfec6e18d6615">
                        <div class="login-form-item" id="userwrap">
                            <div class="icon">
                                <img src="/academic/styles/newstyle/login/imgs/login_ico_user.png" alt="">
                            </div>
                            <input minlength="1" autocomplete="new-password"  placeholder="请输入用户名" type="text" name="j_username" id="name">
                        </div>

                        <div class="login-form-item" id="pwdwrap">
                            <div class="icon">
                                <img src="/academic/styles/newstyle/login/imgs/login_ico_pwd.png" alt="">
                            </div>
                            <input minlength="1" autocomplete="new-password"  placeholder="请输入密码" type="password" name="j_password" >
                        </div>
                        
                        <div id="tipwrap"></div>
                        <div class="login-form-item remember">
                            <input type="checkbox" id="isremember" name="isremember" value="">
                            <label for="isremember"> 记住用户名</label>
                            
                        </div>
                        <div class="login-form-item submit">
                            <input type="button" value="登录" onclick="submitForm()">
                        </div>

                        
                        <div class="login-form-item">
                            <a href="https://cas.glut.edu.cn/portal/login.html?reload=true">统一身份认证</a>

                            
                            &nbsp;&nbsp;&nbsp;&nbsp;  <a target="_blank" href="/academic/user/resetPasswordSendMail.do">找回密码</a>
                            

                        </div>
                        
                    </form>
                </div>
                
            </div>

        </div>
    </div>
</div>
<div class="foot">
    <span>Copyright &#169; 2015-2026优慕课在线教育科技(北京)有限责任公司  All Rights Reserved </span>
</div>

</body>
</html>
